name: Build & Push

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag'
        required: true
        default: 'latest'
      push:
        description: 'Push to registry'
        required: false
        default: 'false'
        type: boolean

env:
  REGISTRY: ghcr.io
  TAG: ${{ github.event.inputs.tag || github.sha }}

jobs:
  build:
    name: Build images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event.inputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=
            type=raw,value=${{ env.TAG }}

      - name: Build and push go-api
        uses: docker/build-push-action@v6
        with:
          context: ./go-api
          push: ${{ github.event.inputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}-go-api
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push ai-service
        uses: docker/build-push-action@v6
        with:
          context: ./ai-service
          push: ${{ github.event.inputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}-ai-service
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push tg-bot
        uses: docker/build-push-action@v6
        with:
          context: ./tg-bot
          push: ${{ github.event.inputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}-tg-bot
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push nginx
        uses: docker/build-push-action@v6
        with:
          context: ./nginx
          push: ${{ github.event.inputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}-nginx
          platforms: linux/amd64,linux/arm64

  artifacts:
    name: Upload artifacts
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build Linux amd64
        env:
          GOOS: linux
          GOARCH: amd64
        run: |
          cd go-api && go build -ldflags="-s -w" -o ../artifacts/go-api-linux-amd64 ./cmd/api/main.go
          cd ../ai-service && go build -ldflags="-s -w" -o ../artifacts/ai-service-linux-amd64 ./cmd/main.go
          cd ../tg-bot && go build -ldflags="-s -w" -o ../artifacts/tg-bot-linux-amd64 ./cmd/main.go

      - name: Build Linux arm64
        env:
          GOOS: linux
          GOARCH: arm64
        run: |
          cd go-api && go build -ldflags="-s -w" -o ../artifacts/go-api-linux-arm64 ./cmd/api/main.go
          cd ../ai-service && go build -ldflags="-s -w" -o ../artifacts/ai-service-linux-arm64 ./cmd/main.go
          cd ../tg-bot && go build -ldflags="-s -w" -o ../artifacts/tg-bot-linux-arm64 ./cmd/main.go

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ env.TAG }}
          path: artifacts/*
          retention-days: 30

      - name: Create checksums
        run: |
          cd artifacts
          sha256sum * > checksums.txt

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums-${{ env.TAG }}
          path: artifacts/checksums.txt
          retention-days: 90

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: artifacts
    if: github.event.inputs.push == 'true' && startsWith(github.event.inputs.tag, 'v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate Release Notes
        id: release-notes
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          path: temp-artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: Release ${{ github.event.inputs.tag }}
          draft: false
          prerelease: ${{ contains(github.event.inputs.tag, 'beta') || contains(github.event.inputs.tag, 'alpha') }}
          generate_release_notes: true
          files: |
            temp-artifacts/*
