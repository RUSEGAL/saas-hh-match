name: Backup

on:
  schedule:
    - cron: '0 3 * * *'  # Daily at 3 AM
  workflow_dispatch:
    inputs:
      retention:
        description: 'Retention days'
        required: false
        default: '7'

env:
  DB_NAME: goapi
  DB_USER: postgres

jobs:
  backup:
    name: Backup PostgreSQL
    runs-on: ubuntu-latest
    container:
      image: postgres:16-alpine
      env:
        POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start PostgreSQL
        run: |
          docker run -d --name postgres \
            -e POSTGRES_PASSWORD=${{ secrets.DB_PASSWORD }} \
            -e POSTGRES_DB=${{ env.DB_NAME }} \
            postgres:16-alpine

      - name: Wait for PostgreSQL
        run: sleep 10

      - name: Run backup
        run: |
          docker cp \
            $(docker ps -q -n=1):/var/lib/postgresql/data \
            ./backup_data

      - name: Create backup archive
        run: |
          tar -czf "backup-$(date +%Y%m%d-%H%M%S).tar.gz" backup_data/
          echo "backup-$(date +%Y%m%d-%H%M%S).tar.gz" >> backup_list.txt

      - name: Upload backup
        uses: actions/upload-artifact@v4
        with:
          name: backup-${{ github.run_number }}
          path: backup-*.tar.gz
          retention-days: ${{ github.event.inputs.retention || '7' }}

      - name: Cleanup
        if: always()
        run: |
          docker stop postgres || true
          docker rm postgres || true
          rm -rf backup_data

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: backup
    if: always()
    steps:
      - name: Notify Slack
        if: needs.backup.result == 'success'
        uses: slackapi/slack-github-action@v1.25
        with:
          payload: |
            {
              "text": "✅ Database backup completed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "✅ *Database Backup*\nStatus: Success\nEnvironment: Production"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Failure
        if: needs.backup.result == 'failure'
        uses: slackapi/slack-github-action@v1.25
        with:
          payload: |
            {
              "text": "❌ Database backup failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ *Database Backup Failed*\nCheck logs immediately!"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
