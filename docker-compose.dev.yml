version: "3.8"

services:
  api:
    build:
      context: ./go-api
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
      - "6060:6060"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=goapi
      - REDIS_ADDR=redis:6379
      - NATS_URL=nats://nats:4222
      - JWT_SECRET=dev-secret-change-in-prod
    volumes:
      - ./go-api:/app
      - go-modules:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      nats:
        condition: service_started
    networks:
      - dev-network

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile.dev
    environment:
      - NATS_URL=nats://nats:4222
      - API_WEBHOOK_URL=http://api:8080/ai/webhook/analyze
      - API_WEBHOOK_MATCHES_URL=http://api:8080/ai/webhook/matches
      - AI_API_KEY=${AI_API_KEY}
      - MAIN_API_URL=http://api:8080
      - HH_API_URL=https://api.hh.ru
    volumes:
      - ./ai-service:/app
      - ai-modules:/go/pkg/mod
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - dev-network

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=goapi
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./go-api/internal/config/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dev-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - dev-network

  nats:
    image: nats:2.10-alpine
    command: ["-js"]
    ports:
      - "4222:4222"
      - "8222:8222"
    networks:
      - dev-network

  tg-bot:
    build:
      context: ./tg-bot
      dockerfile: Dockerfile.dev
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - API_URL=http://api:8080
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/bot?sslmode=disable
      - REDIS_ADDR=redis:6379
    volumes:
      - ./tg-bot:/app
      - bot-modules:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - dev-network

volumes:
  postgres_dev_data:
  redis_dev_data:
  nats_dev_data:
  go-modules:
  ai-modules:
  bot-modules:

networks:
  dev-network:
    driver: bridge
