pid_file: "/var/run/nats/nats.pid"

server_name: "nats-server"

port: 4222
http_port: 8222

log_file: "/var/log/nats/server.log"

max_payload: 8MB
max_connections: 10000

cluster {
  name: "nats-cluster"
  port: 6222
  routes = []
  cluster_advertise: "nats-cluster:6222"
  connect_retries: 30
}

jetstream {
  store_dir: "/data/jetstream"
  max_memory_store: 1GB
  max_file_store: 10GB
  
  domain: "goapi"
}

streams: [
  {
    name: "RESUME_ANALYZE",
    subjects: ["resume.analyze"]
    retention: "workqueue"
    storage: "file"
    max_msgs: -1
    max_bytes: -1
  },
  {
    name: "VACANCY_MATCH",
    subjects: ["vacancy.match"]
    retention: "workqueue"
    storage: "file"
    max_msgs: -1
    max_bytes: -1
  }
]

consumers: [
  {
    stream_name: "RESUME_ANALYZE"
    name: "ai-resume-analyzer"
    durable: true
    deliver_subject: "ai.resume.analyze"
    ack_policy: "explicit"
  }
]

leafnodes {
  port: 7422
}
